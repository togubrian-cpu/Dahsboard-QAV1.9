<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Quality - Full Screen TV</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h2 { 
            position: absolute;
            top: 15px;
            left: 20px;
            z-index: 100;
            color: #f2f2f2;
            letter-spacing: 2px;
            font-weight: 300;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.4);
            padding: 5px 15px;
            border-radius: 5px;
        }

        .dashboard-content {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .tab-panel {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
            will-change: opacity;
        }

        .tab-panel.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 1;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: lime;
            width: 0%;
            z-index: 200;
        }
    </style>
</head>

<body>

<h2>Dashboard Quality</h2>

<div class="dashboard-content">

    <div class="tab-panel">

    <!-- Progress -->
    <div class="progress-bar" id="progressBar"></div>

</div>

<script>
    // ==============================
    // 🔧 KONFIGURASI (TINGGAL UBAH ANGKA MENIT)
    // ==============================

    const SLIDE_INTERVAL = 20 * 1000;      // ⏱️ 20 detik per slide
    const REFRESH_INTERVAL = 60 * 60 * 1000; // 🔄 60 menit refresh
    const MOUSE_IDLE_DELAY = 3 * 1000;    // 🖱️ 3 detik pause delay

    // ==============================
    // SYSTEM (JANGAN DIUBAH)
    // ==============================

    let currentSlide = 0;
    const panels = document.getElementsByClassName("tab-panel");
    const totalSlides = panels.length;

    const progressBar = document.getElementById("progressBar");

    let startTime;
    let animationFrame;
    let isPaused = false;
    let pausedTime = 0;

    function showSlide(index) {
        for (let i = 0; i < panels.length; i++) {
            panels[i].classList.remove("active");
        }
        panels[index].classList.add("active");
    }

    function nextSlide() {
        currentSlide = (currentSlide + 1) % totalSlides;
        showSlide(currentSlide);
        startProgress();
    }

    function startProgress() {
        cancelAnimationFrame(animationFrame);

        startTime = Date.now();
        pausedTime = 0;

        function animate() {
            if (isPaused) return;

            const elapsed = Date.now() - startTime;
            const progress = Math.min(elapsed / SLIDE_INTERVAL, 1);

            progressBar.style.width = (progress * 100) + "%";

            if (progress < 1) {
                animationFrame = requestAnimationFrame(animate);
            } else {
                nextSlide();
            }
        }

        animate();
    }

    function pauseSlider() {
        if (isPaused) return;
        isPaused = true;
        pausedTime = Date.now();
    }

    function resumeSlider() {
        if (!isPaused) return;

        isPaused = false;

        const pauseDuration = Date.now() - pausedTime;
        startTime += pauseDuration;

        animationFrame = requestAnimationFrame(runAnimation);
    }

    function runAnimation() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / SLIDE_INTERVAL, 1);

        progressBar.style.width = (progress * 100) + "%";

        if (progress < 1 && !isPaused) {
            animationFrame = requestAnimationFrame(runAnimation);
        } else if (progress >= 1) {
            nextSlide();
        }
    }

    // Pause saat mouse gerak
    let mouseTimer;
    document.addEventListener("mousemove", () => {
        pauseSlider();

        clearTimeout(mouseTimer);
        mouseTimer = setTimeout(() => {
            resumeSlider();
        }, MOUSE_IDLE_DELAY);
    });

    // Start
    window.addEventListener("load", () => {
        setTimeout(() => {
            showSlide(currentSlide);
            startProgress();
        }, 2000);
    });

    // Auto refresh
    setInterval(() => {
        location.reload();
    }, REFRESH_INTERVAL);
</script>

</body>
</html>
